<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Welcome to DuRest</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css">
  </head>
  <body class="bg-main d-flex flex-column min-vh-100">

    <div class="container my-auto py-5">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-5">
                <div class="auth-card p-4 p-md-5">
                    <div class="text-center mb-4">
                        <i class="fa fa-user-plus fa-2x text-orange mb-3"></i>
                        <h2 class="text-white">Create an Account</h2>
                        <p class="text-secondary text-sm">Join DuRest to Book a Table</p>
                    </div>

                    <form id="signupForm">
                        <label for="" class="form-label text-secondary">Fullname</label>
                        <div class="input-group mb-3">
                            <span class="input-group-text" 
                            style="background-color: #383838; border-color: #555; color: #ccc">
                                <i class="fa-solid fa-user"></i>
                            </span>
                            <input type="text" class="form-control input-bg text-white">
                        </div>

                        <label for="" class="form-label text-secondary">Email</label>
                        <div class="input-group mb-3">
                            <span class="input-group-text" 
                            style="background-color: #383838; border-color: #555; color: #ccc">
                                <i class="fa-solid fa-envelope"></i>
                            </span>
                            <input type="email" class="form-control input-bg text-white">
                        </div>

                        <label for="" class="form-label text-secondary">Password</label>
                        <div class="input-group mb-3">
                            <span class="input-group-text" 
                            style="background-color: #383838; border-color: #555; color: #ccc">
                                <i class="fa-solid fa-lock"></i>
                            </span>
                            <input type="password" class="form-control input-bg text-white">
                        </div>

                        <label for="" class="form-label text-secondary">Confirm Password</label>
                        <div class="input-group mb-3">
                            <span class="input-group-text" 
                            style="background-color: #383838; border-color: #555; color: #ccc">
                                <i class="fa-solid fa-lock"></i>
                            </span>
                            <input type="password" class="form-control input-bg text-white">
                        </div>

                        <button class="btn bg-orange text-white w-100 rounded-pill py-2 fw-bold" type="submit">
                            Create Account <i class="fa fa-arrow-right ms-1"></i>
                        </button>
                    </form>

                    <p class="text-secondary text-sm mt-4">
                        Already have an account? 
                        <a href="login.html" class="text-white text-decoration-none">Sign In</a>
                    </p>
                </div>
            </div>
        </div>
    </div>


        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
